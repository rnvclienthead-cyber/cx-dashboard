name: WB Ratings Daily Sync

on:
  schedule:
    # Запуск каждый день в 00:19 по UTC (03:19 по МСК)
    - cron: '19 0 * * *'
  workflow_dispatch: # Позволяет запускать скрипт вручную по кнопке

jobs:
  sync_ratings:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sqlalchemy psycopg2-binary playwright playwright-stealth
        playwright install chromium

    - name: Run Sync Script
      env:
        WB_API_KEY: ${{ secrets.WB_API_KEY }}
        DB_URL: ${{ secrets.DB_URL }}
        python sync_ratings.py
