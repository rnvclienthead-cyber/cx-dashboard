name: WB Data Sync Worker

# КОГДА ЗАПУСКАТЬ СКРИПТ:
on:
  schedule:
    # Запуск каждый день в 03:00 по UTC (06:00 по Москве)
    - cron: '0 3 * * *'
    # Запуск каждый день в 15:00 по UTC (18:00 по Москве)
    # - cron: '0 15 * * *' (Раскомментируйте, если нужно дважды в день)
  workflow_dispatch: # Позволяет запускать скрипт вручную по кнопке из интерфейса GitHub

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Или версия, которую вы используете
          cache: 'pip' # Ускоряет установку зависимостей

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DEBUG - Show files and code
        run: |
          echo "=== СПИСОК ФАЙЛОВ В ПАПКЕ ==="
          ls -la
          echo "=== СОДЕРЖИМОЕ worker.py ПО СТРОКАМ ==="
          cat -n worker.py

      - name: Run worker script
        # Передаем секреты из GitHub в переменные окружения ОС
        env:
          WB_API_KEY: ${{ secrets.WB_API_KEY }}
          DB_URL: ${{ secrets.DB_URL }}
        run: python worker.py
