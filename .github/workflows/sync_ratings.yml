name: Sync WB Ratings (Playwright)

on:
  schedule:
    # 04:47 МСК (UTC+3) = 01:47 UTC
    - cron: '47 1 * * *'
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  sync:
    runs-on: ubuntu-latest
    
    # Переменная для немедленного вывода логов Python в консоль GitHub
    env:
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Ускоряет повторные запуски

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          # Вместо прямой команды вызываем модуль через python -m
          python -m playwright install chromium --with-deps

      - name: Run Ratings Sync
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: python sync_ratings.py
